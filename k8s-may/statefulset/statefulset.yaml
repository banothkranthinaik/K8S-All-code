apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mydatabase
  namespace: prod

spec:
  serviceName: mydatabase-svc
  replicas: 4
  minReadySeconds: 5

  selector:
    matchLabels:
      app: database

  template:
    metadata:
      labels:
        app: database

    spec:
      containers:
        - name: my-database-container
          image: mysql
          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootroot

            - name: MYSQL_DATABASE
              value: studentdb

            - name: MYSQL_USER
              value: admin

            - name: MYSQL_PASSWORD
              value: admin@123

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: mysql-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi