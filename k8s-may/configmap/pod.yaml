apiVersion: v1
kind: Pod
metadata:
  name: configmap-pod
spec:
  containers:
    - name: nginx-container
      image: nginx
      env:
        -  name: APP_ENV
           valueForm:
             configMapKeyRef:
               name: my-configmap
               key: APP_ENV
        -  name: APP_PORT
           valueForm:
             configMapKeyRef:
               name: my-configmap
               key: APP_PORT
        -  name:  DOCKER_BUILDID
           valueForm:
             configMapKeyRef:
              key: DOCKER_BUILDID
              name: my-configmap