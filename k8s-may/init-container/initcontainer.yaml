apiVersion: v1
kind: Pod

metadata:
  name: myinitpod

spec:
  volumes:
    - name: html-volume
      emptyDir: {}

  initContainers:
    - name: init-container
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "<h1>Hello from Init Container</h1>" > /usr/share/nginx/html/index.html

      volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html

  containers:
    - name: my-app-container
      image: nginx:1.29
      ports:
        - containerPort: 80

      volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html

